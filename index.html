
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Frontier: Anime RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #050b14;
            --color-primary: #00f3ff; /* Cyan */
            --color-secondary: #ff0055; /* Magenta */
            --color-accent: #bc13fe; /* Purple */
            --color-panel: rgba(10, 15, 30, 0.85);
            --color-text: #e0f7fa;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(5, 11, 20, 0.92), rgba(5, 11, 20, 0.92)),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }
        
        .anime-title { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
        .anime-text { font-family: 'Rajdhani', sans-serif; }
        
        /* Tech/Anime UI Borders */
        .tech-border {
            position: relative;
            background: var(--color-panel);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .tech-border::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
        }
        
        .tech-card-clip {
            clip-path: polygon(
                20px 0, 100% 0, 
                100% calc(100% - 20px), calc(100% - 20px) 100%, 
                0 100%, 0 20px
            );
        }

        /* Glitch/Hover Effects */
        .anime-button {
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .anime-button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--color-primary);
            text-shadow: 0 0 8px currentColor;
        }
        
        .scanline {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Tooltip Styles */
        .tooltip-trigger:hover .custom-tooltip {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -10px) scale(1);
        }
        .custom-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translate(-50%, 0) scale(0.95);
            transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 100;
            width: 240px;
            pointer-events: none;
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; filter: brightness(2); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }
        .animate-pop-in {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scan {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
        .animate-scan {
            background: linear-gradient(45deg, transparent 40%, rgba(0, 243, 255, 0.2) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: scan 2s linear infinite;
        }

        /* Rarity Specific Animations */
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 10px rgba(234, 179, 8, 0.2), inset 0 0 5px rgba(234, 179, 8, 0.1); border-color: rgba(234, 179, 8, 0.6); }
            50% { box-shadow: 0 0 20px rgba(234, 179, 8, 0.5), inset 0 0 10px rgba(234, 179, 8, 0.2); border-color: rgba(234, 179, 8, 1); }
        }
        .rarity-legendary-glow {
            animation: pulse-gold 3s infinite ease-in-out;
        }

        @keyframes pulse-purple {
            0%, 100% { box-shadow: 0 0 8px rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.5); }
            50% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-color: rgba(168, 85, 247, 0.9); }
        }
        .rarity-epic-glow {
            animation: pulse-purple 4s infinite ease-in-out;
        }

        @keyframes holographic {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .animate-holo {
            background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.15) 45%, transparent 60%);
            background-size: 300% 100%;
            animation: holographic 4s infinite linear;
        }

        @keyframes sparkle-fade {
            0%, 100% { opacity: 0; transform: scale(0.2); }
            50% { opacity: 0.8; transform: scale(1.2) rotate(45deg); }
        }
        .animate-sparkle-1 { animation: sparkle-fade 2.5s infinite ease-in-out; }
        .animate-sparkle-2 { animation: sparkle-fade 3.5s infinite 1s ease-in-out; }
    </style>
